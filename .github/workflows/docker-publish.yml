name: Publish Docker image

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      eze_repository:
        description: GitHub repository containing the EZE fork to install first.
        required: false
        default: OdysseyScorpio/eze
      eze_ref:
        description: Branch, tag, or SHA to check out from the EZE fork.
        required: false
        default: main
      image_tag:
        description: Docker image tag to publish.
        required: false
        default: 2.0.0-SNAPSHOT

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: camundaguru/zeebe-play
  DEFAULT_EZE_REPOSITORY: OdysseyScorpio/eze
  DEFAULT_EZE_REF: main
  DEFAULT_IMAGE_TAG: 2.0.0-SNAPSHOT

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve build settings
        id: settings
        shell: bash
        env:
          INPUT_EZE_REPOSITORY: ${{ inputs.eze_repository }}
          INPUT_EZE_REF: ${{ inputs.eze_ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          image_name="${REGISTRY}/${IMAGE_NAME,,}"
          eze_repository="${INPUT_EZE_REPOSITORY:-$DEFAULT_EZE_REPOSITORY}"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            image_tag="${GITHUB_REF_NAME#v}"
            eze_ref="${INPUT_EZE_REF:-$GITHUB_REF_NAME}"
          else
            image_tag="${INPUT_IMAGE_TAG:-$DEFAULT_IMAGE_TAG}"
            eze_ref="${INPUT_EZE_REF:-$DEFAULT_EZE_REF}"
          fi

          {
            echo "image_name=${image_name}"
            echo "image_tag=${image_tag}"
            echo "eze_repository=${eze_repository}"
            echo "eze_ref=${eze_ref}"
            echo "tags<<EOF"
            echo "${image_name}:${image_tag}"
            echo "${image_name}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check out zeebe-play
        uses: actions/checkout@v6
        with:
          path: zeebe-play

      - name: Check out EZE
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.settings.outputs.eze_repository }}
          ref: ${{ steps.settings.outputs.eze_ref }}
          path: eze

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Install EZE snapshot
        working-directory: eze
        run: mvn -B -q -DskipTests -Dfmt.skip=true install

      - name: Package zeebe-play
        working-directory: zeebe-play
        run: mvn -B -q -DskipTests package

      - name: Resolve Maven project version
        id: project
        working-directory: zeebe-play
        run: |
          version="$(mvn -B -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: zeebe-play
          file: zeebe-play/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.settings.outputs.tags }}
          labels: |
            org.opencontainers.image.description=Zeebe Play for Camunda 8.9.0
            org.opencontainers.image.licenses=Apache-2.0
          build-args: |
            JAR_FILE=target/zeebe-play-${{ steps.project.outputs.version }}.jar
