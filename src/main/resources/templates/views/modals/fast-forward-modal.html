<div th:fragment="fast-forward-modal">
  <div
    class="modal fade"
    id="fast-forward-modal"
    tabindex="-1"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Fast Forward</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="fast-forward-target-id" />

          <div class="mb-3">
            <label class="form-label">Target</label>
            <div id="fast-forward-target" class="fw-semibold"></div>
          </div>

          <div id="fast-forward-summary" class="mb-3"></div>

          <table
            id="fast-forward-routes"
            class="table table-striped table-hover caption-top"
          >
            <caption>
              Routes
            </caption>
            <thead>
              <tr>
                <th scope="col">Use</th>
                <th scope="col">Route</th>
                <th scope="col">Gateway Choices</th>
                <th scope="col">Steps</th>
              </tr>
            </thead>
            <tbody id="fast-forward-routes-table"></tbody>
          </table>

          <table
            id="fast-forward-gateway-decisions"
            class="table table-striped table-hover caption-top"
          >
            <caption>
              Gateway Decisions
            </caption>
            <thead>
              <tr>
                <th scope="col">Gateway</th>
                <th scope="col">Path</th>
                <th scope="col">Next Step</th>
                <th scope="col">Condition</th>
              </tr>
            </thead>
            <tbody id="fast-forward-gateway-decisions-table"></tbody>
          </table>

          <form class="form">
            <div class="row">
              <div class="col col-md-3">
                <label for="fast-forward-variables-scope" class="form-label"
                  >Scope</label
                >
                <input
                  class="form-control"
                  id="fast-forward-variables-scope"
                  type="text"
                  value="global"
                  readonly
                />
              </div>
              <div class="col">
                <label for="fast-forward-variables-payload" class="form-label"
                  >Variables (JSON)</label
                >
                <textarea
                  class="form-control"
                  id="fast-forward-variables-payload"
                  rows="5"
                  placeholder='{"variableName": "variableValue"}'
                ></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
          <button
            id="fast-forward-confirm-button"
            type="button"
            class="btn btn-primary"
            onclick="confirmFastForwardModal();"
          >
            Fast Forward
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
