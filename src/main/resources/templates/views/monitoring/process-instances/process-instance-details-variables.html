<div th:fragment="process-instance-details-variables">
  <div class="row">
    <div class="col">
      <div class="d-flex justify-content-end py-2">
        <button
          id="copy-process-instance-variables"
          type="button"
          class="btn btn-sm btn-outline-secondary"
          title="Copy variables as JSON"
          onclick="copyProcessInstanceVariables();"
          disabled
        >
          <svg class="bi" width="16" height="16" fill="currentColor">
            <use xlink:href="/img/bootstrap-icons.svg#clipboard" />
          </svg>
          Copy JSON
        </button>
      </div>
      <table
        class="table table-striped table-hover caption-top"
        id="variables-of-process-instance-table"
      >
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Value</th>
            <th scope="col">Scope</th>
            <th scope="col">Scope Element</th>
            <th scope="col">Scope Key</th>
            <th scope="col">Last Updated</th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
            <td>-</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
