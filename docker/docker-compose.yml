version: "3"

networks:
  zeebe_network:
    driver: bridge

services:
  zeebe-play-in-memory:
    container_name: zeebe-play-in-memory
    image: ${ZEEBE_PLAY_IMAGE:-zeebe-play:2.0.0-SNAPSHOT}
    ports:
      - "8080:8080"
      - "26500:26500"
    networks:
      - zeebe_network
    profiles:
      - in-memory

  zeebe-play-remote-engine:
    container_name: zeebe-play-remote-engine
    image: ${ZEEBE_PLAY_IMAGE:-zeebe-play:2.0.0-SNAPSHOT}
    environment:
      - ZEEBE_ENGINE=remote
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLOCK_ENDPOINT=zeebe:9600/actuator/clock
      - ZEEBE_CLIENT_WORKER_HAZELCAST_CONNECTION=zeebe:5701
    ports:
      - "8080:8080"
    networks:
      - zeebe_network
    depends_on:
      - zeebe
    profiles:
      - remote-engine

  zeebe-play-postgres:
    container_name: zeebe-play-postgres
    image: ${ZEEBE_PLAY_IMAGE:-zeebe-play:2.0.0-SNAPSHOT}
    environment:
      - ZEEBE_ENGINE=remote
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLOCK_ENDPOINT=zeebe:9600/actuator/clock
      - ZEEBE_CLIENT_WORKER_HAZELCAST_CONNECTION=zeebe:5701
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-zeebe-play:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=zeebe
      - SPRING_DATASOURCE_DRIVERCLASSNAME=org.postgresql.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create
    ports:
      - "8080:8080"
    networks:
      - zeebe_network
    depends_on:
      - zeebe
      - postgres-zeebe-play
    profiles:
      - postgres

  zeebe-play-mysql:
    container_name: zeebe-play-mysql
    image: ${ZEEBE_PLAY_IMAGE:-zeebe-play:2.0.0-SNAPSHOT}
    environment:
      - ZEEBE_ENGINE=remote
      - ZEEBE_CLIENT_BROKER_GATEWAYADDRESS=zeebe:26500
      - ZEEBE_CLOCK_ENDPOINT=zeebe:9600/actuator/clock
      - ZEEBE_CLIENT_WORKER_HAZELCAST_CONNECTION=zeebe:5701
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-zeebe-play:3306/zeebe-play?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=zeebe
      - SPRING_DATASOURCE_DRIVERCLASSNAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQL8Dialect
      - SPRING_JPA_HIBERNATE_NAMING_PHYSICAL_STRATEGY=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create
    ports:
      - "8080:8080"
    networks:
      - zeebe_network
    depends_on:
      - zeebe
      - mysql-zeebe-play
    profiles:
      - mysql

  zeebe:
    container_name: zeebe_broker
    image: ${ZEEBE_BROKER_IMAGE:-camunda/zeebe:8.9.0}
    environment:
      - ZEEBE_LOG_LEVEL=debug
      - ZEEBE_CLOCK_CONTROLLED=true
      - ZEEBE_BROKER_EXPORTERS_HAZELCAST_CLASSNAME=io.zeebe.hazelcast.exporter.HazelcastExporter
      - ZEEBE_BROKER_EXPORTERS_HAZELCAST_JARPATH=/usr/local/zeebe/exporters/zeebe-hazelcast-exporter.jar
    volumes:
      - ${ZEEBE_HAZELCAST_EXPORTER_JAR:-../target/docker/zeebe-hazelcast-exporter.jar}:/usr/local/zeebe/exporters/zeebe-hazelcast-exporter.jar:ro
    ports:
      - "26500:26500"
      - "5701:5701"
      - "9600:9600"
    networks:
      - zeebe_network
    profiles:
      - remote-engine
      - postgres
      - mysql

  postgres-zeebe-play:
    image: ${POSTGRES_IMAGE:-postgres:12.2}
    restart: always
    environment:
      POSTGRES_PASSWORD: zeebe
    volumes:
      - postgres-zeebe-play-data:/var/lib/postgresql/data
    networks:
      - zeebe_network
    profiles:
      - postgres

  mysql-zeebe-play:
    image: ${MYSQL_IMAGE:-mysql:8}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: zeebe
    volumes:
      - mysql-zeebe-play-data:/var/lib/mysql
    networks:
      - zeebe_network
    profiles:
      - mysql

volumes:
  postgres-zeebe-play-data:
    driver: local
  mysql-zeebe-play-data:
    driver: local
